syntax = "proto3";

option java_multiple_files = true;
option java_package ="com.proto.service";
option java_outer_classname = "ProductProto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";

message Product {
  int64 id = 1;
  string name = 2;
  int64 price = 3;
}

message ProductList {
  repeated Product resultList = 1;
  google.protobuf.Int64Value resultCount = 2;
}

message ProductFilter {
  optional int64 minPrice = 1;
  optional int64 maxPrice = 2;
}

service ProductService {
  rpc create(Product) returns (Product) {};
  rpc update(Product) returns (Product) {};
  rpc findById(google.protobuf.Int64Value) returns (Product) {};
  rpc list(ProductFilter) returns (ProductList) {};
  rpc delete(google.protobuf.Int64Value) returns (google.protobuf.BoolValue) {};

}