---
openapi: 3.1.0
info:
  title: first-quarkus-api API
  version: 1.0.0-SNAPSHOT
tags:
  - name: customer
    description: Customer Operations
  - name: product
    description: Product Operations
components:
  schemas:
    CustomerCreateRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        active:
          type: boolean
        lastActivity:
          type: string
          format: date-time
    CustomerUpdateRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        active:
          type: boolean
        lastActivity:
          type: string
          format: date-time
    CustomerResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        active:
          type: boolean
        lastActivity:
          type: string
          format: date-time
    ProductCreateRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: integer
          format: int64
    ProductUpdateRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: integer
          format: int64
    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: integer
          format: int64
paths:
  /api/v1/customers:
    post:
      tags:
        - customer
      operationId: createCustomer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerCreateRequest"
        required: true
      responses:
        "201":
          description: Customer Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        "400":
          description: Invalid Customer
      summary: Create
    put:
      tags:
        - customer
      operationId: updateCustomer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdateRequest"
        required: true
      responses:
        "204":
          description: Customer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        "400":
          description: Invalid Customer
        "404":
          description: Customer does not exist for given id
      summary: Update
    get:
      tags:
        - customer
      operationId: getAllCustomers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerResponse"
      summary: List
  /api/v1/customers/{id}:
    get:
      tags:
        - customer
      operationId: getCustomerById
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Get Customer by id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        "404":
          description: Customer does not exist for given id
      summary: Find By Id
    delete:
      tags:
        - customer
      operationId: deleteCustomerById
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Customer deleted
          content:
            application/json: {}
        "204":
          description: Customer does not exist for given id
      summary: Delete
  /api/v1/products:
    put:
      tags:
        - product
      operationId: updateProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdateRequest"
        required: true
      responses:
        "204":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Invalid Product
        "404":
          description: Product does not exist for given id
      summary: Update
    get:
      tags:
        - product
      operationId: getAllProducts
      parameters:
        - name: minPrice
          in: query
          description: Minimal price of returned product
          required: false
          schema:
            type: integer
        - name: maxPrice
          in: query
          description: Maximal price of returned product
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductResponse"
      summary: List
    post:
      tags:
        - product
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreateRequest"
        required: true
      responses:
        "201":
          description: Product Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Invalid Product
      summary: Create
  /api/v1/products/{id}:
    get:
      tags:
        - product
      operationId: getProductById
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Get Product by id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Product does not exist for given id
      summary: Find By Id
    delete:
      tags:
        - product
      operationId: deleteProductById
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Product deleted
          content:
            application/json: {}
        "204":
          description: Product does not exist for given id
      summary: Delete

